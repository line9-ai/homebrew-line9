# Standard Homebrew tap CI (bead lw-hcz.2.6.1). Runs `brew test-bot` on every
# PR so a formula change is audited/styled/tested before it lands — the gate
# `Formula/line9.rb` (bead lw-hcz.2.6) relies on. No-op while the tap is empty.
name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-bot:
    strategy:
      matrix:
        os: [macos-14, macos-13, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'
